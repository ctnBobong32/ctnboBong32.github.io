<!-- ✅ 随机音乐API（完整保留） -->
<script>
(function() {
const audio = document.getElementById('bg-music');

const apis = [
{ url: 'https://api.52vmy.cn/api/music/wy/rand', extract: d => d.data?.Music },
{ url: 'https://api-v2.cenguigui.cn/api/netease/', extract: d => d.data?.play_url },
{ url: 'https://api.zxki.cn/api/wyyrg', extract: d => d.data?.url }
];

function play(url){
audio.src=url;
audio.play().catch(()=>{});
}

async function load(){
const api = apis[Math.floor(Math.random()*apis.length)];
try{
const r = await fetch(api.url);
const j = await r.json();
const u = api.extract(j);
if(u) play(u);
}catch(e){}
}

document.getElementById('play-music-link').onclick=function(e){
e.preventDefault();
load();
};

setTimeout(load,800);
})();
</script>
